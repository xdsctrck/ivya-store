<!DOCTYPE html>
<html>
<head>
    <title>Ivya Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: #f5f5f5;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .producto {
            background: white;
            padding: 20px;
            margin: 20px;
            border-radius: 10px;
            display: inline-block;
            width: 200px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: green;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            margin-top: 10px;
        }

        button:hover {
            background: darkgreen;
        }
    </style>
</head>
<body>

    <h1>📱 Ivya Store</h1>

    <div class="producto">
        <img src="https://itechcolombia.co/wp-content/uploads/2022/05/iphone11-black-select-2019_GEO_EMEA-1.png" alt="iPhone 11">
        <h2>iPhone 11</h2>
        <p>Precio: S/849</p>
        <button onclick="comprar('iPhone 11')">Comprar</button>
    </div>

    <div class="producto">
        <img src="https://www.dubaidutyfree.com/ccstore/v1/images/?source=/file/v4984042001412937867/products/112244216.0.jpg&height=940&width=940" alt="iPhone 12">
        <h2>iPhone 12</h2>
        <p>Precio: S/1599</p>
        <button onclick="comprar('iPhone 12')">Comprar</button>
    </div>

    <script>
        function comprar(producto) {
            let numero = "51994703638"; // tu número
            let mensaje = "Hola, quiero comprar " + producto;
            let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

            window.open(url, "_blank");
        }
    </script>

</body>
</html>
