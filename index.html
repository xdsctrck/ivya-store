<!DOCTYPE html>
<html>
<head>
    <title>Navi Store</title>
    <style>
        body {
            font-family: Arial;
            background-color: #0f0f0f;
            color: white;
            text-align: center;
        }

        h1 {
            margin-top: 20px;
        }

        .producto {
            background: #1c1c1c;
            padding: 20px;
            margin: 20px;
            border-radius: 15px;
            display: inline-block;
            width: 220px;
        }

        img {
            width: 100%;
            border-radius: 10px;
        }

        button {
            background: #00c853;
            color: white;
            border: none;
            padding: 12px;
            border-radius: 8px;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
        }

        button:hover {
            background: #00a844;
        }

        .marca {
            margin: 20px;
            font-size: 14px;
            color: #aaa;
        }
    </style>
</head>
<body>

    <h1>📱 Navi Store</h1>
    <p>✅ Equipos originales | 🔒 Garantía | 🚚 Entrega rápida</p>

    <div class="producto">
        <img src="https://itechcolombia.co/wp-content/uploads/2022/05/iphone11-black-select-2019_GEO_EMEA-1.png" alt="iPhone 11">
        <h2>iPhone 11</h2>
        <p>S/849</p>
        <p style="color: #00c853;">🔥 Stock limitado</p>
        <button onclick="comprar('iPhone 11')">Comprar ahora por WhatsApp</button>
        <p>📍 Piura - Entregas personales</p>
    </div>

    <div class="producto">
        <img src="https://www.dubaidutyfree.com/ccstore/v1/images/?source=/file/v4984042001412937867/products/112244216.0.jpg&height=940&width=940" alt="iPhone 12">
        <h2>iPhone 12</h2>
        <p>S/1599</p>
        <p style="color: #00c853;">🔥 Stock limitado</p>
        <button onclick="comprar('iPhone 12')">Comprar ahora por WhatsApp</button>
        <p>📍 Piura - Entregas personales</p>
    </div>

    <div class="marca">
        © 2026 Navi Store - Piura
    </div>

    <script>
        function comprar(producto) {
            let numero = "51994703638";
            let mensaje = "Hola, quiero comprar " + producto;
            let url = "https://wa.me/" + numero + "?text=" + encodeURIComponent(mensaje);

            window.open(url, "_blank");
        }
    </script>

</body>
</html>
